name: bober

x-base-bot-service: &base-bot
  restart: always
   
x-base-db: &base-db
  image: mariadb:11.6
  restart: always
  healthcheck:
    test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
    start_period: 10s
    interval: 10s
    timeout: 5s
    retries: 5

x-base-config: &base-config
  restart: always
  environment:
      - ASPNETCORE_URLS=http://+:8080

services:
  metube:
    container_name: metube
    networks:
      - bober-net
      - bober-net-dev
    profiles:
      - prod
      - dev
    volumes:
      - metube-downloads:/downloads
    image: ghcr.io/alexta69/metube
    ports:
        - "8082:8081"
    restart: always
    environment:
      - YTDL_OPTIONS={"cookiesfrombrowser":null,"merge_output_format":"mp4","format":"bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best"}
      - DELETE_FILE_ON_TRASHCAN=true
      - OUTPUT_TEMPLATE=%(title)s [%(id)s].%(ext)s

  bot:
    image: ghcr.io/natashalysakova/bober-bot:latest
    container_name: bot
    networks:
      - bober-net
    profiles:
      - prod
    env_file:
      - prod.env
      - .env
    volumes:
      - images:/app/images
    depends_on:
      database:
        condition: service_healthy
        restart: true
      metube:
        condition: service_started
        restart: true
    << : *base-bot
    
  bot-dev:
    image: bober-bot:dev
    build:
      context: .
      dockerfile: TelegramMultiBot/Dockerfile
    container_name: bot-dev
    networks:
      - bober-net-dev
    profiles:
      - dev
    env_file:
      - dev.env
      - .env
    depends_on:
      database-dev:
        condition: service_healthy
        restart: true
      metube:
        condition: service_started
        restart: true
    << : *base-bot

  database:
    container_name: database  
    networks:
      - bober-net
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - 3306:3306
    profiles:
      - prod
    env_file:
      - prod.env
      - .env
    << : *base-db

  database-dev:
    container_name: database-dev
    networks:
      - bober-net-dev
    volumes:
      - dbdata-dev:/var/lib/mysql
    ports:
      - 3307:3306
    profiles:
      - dev
    env_file:
      - dev.env
      - .env
    << : *base-db

  config-ui:
    image: ghcr.io/natashalysakova/bober-config-ui:latest
    container_name: config 
    ports:
      - 5268:8080 
    env_file:
      - prod.env 
      - .env
    networks:
      - bober-net
    profiles:
      - prod
    depends_on:
      database:
        condition: service_healthy
        restart: true
    << : *base-config
  
  config-ui-dev:
    image: bober-config-ui:dev
    container_name: config-dev
    build:
      context: .
      dockerfile: ConfigUI/Dockerfile
    ports:
      - 5266:8080 
    env_file:
      - dev.env 
      - .env
    networks:
      - bober-net-dev
    profiles:
      - dev
    depends_on:
      database-dev:
        condition: service_healthy
        restart: true
    << : *base-config
      
networks:
  bober-net:
    driver: bridge
  bober-net-dev:
    driver: bridge
volumes:
  dbdata:
    driver: local
  images:
    driver: local
  dbdata-dev:
    driver: local
  metube-downloads:
    driver: local